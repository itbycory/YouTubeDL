version: '3.8'

services:
  yt-dlp-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - PORT=${PORT:-8080}
      - DOWNLOADS_DIR=/app/downloads
      - DEFAULT_AUDIO_QUALITY=${DEFAULT_AUDIO_QUALITY:-192}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-1073741824}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
